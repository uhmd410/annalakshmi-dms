<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#E8824C">
    <meta name="description" content="Annalakshmi Data Management System — Internal tool for Oota.app home chef operations.">
    <title>{% block title %}Annalakshmi DMS{% endblock %}</title>
    
    <!-- Google Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Bootstrap 5.3.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <!-- Bootstrap Icons 1.11.3 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Custom CSS (overrides Bootstrap defaults) -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="page-wrapper">
        <!-- Sticky Navbar -->
        <nav class="navbar navbar-expand-lg sticky-top shadow-sm">
            <div class="container">
                <a class="navbar-brand" href="/pages/dashboard">
                    <i class="bi bi-fire me-2"></i>Annalakshmi DMS
                </a>
                <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav ms-auto gap-1">
                        <li class="nav-item">
                            <a class="nav-link" id="nav-dashboard" href="/pages/dashboard">
                                <i class="bi bi-grid-1x2 me-1 d-lg-none"></i>Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" id="nav-records" href="/pages/records">
                                <i class="bi bi-list-ul me-1 d-lg-none"></i>View Records
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" id="nav-add" href="/pages/add">
                                <i class="bi bi-plus-circle me-1 d-lg-none"></i>Add New
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- Toast Container -->
        <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3" style="z-index:1080;" aria-live="polite" aria-atomic="true"></div>

        <!-- Main Content -->
        <main class="main-content py-4">
            <div class="container">
                {% block content %}{% endblock %}
            </div>
        </main>

        <!-- Footer -->
        <footer class="footer mt-auto py-3">
            <div class="container text-center">
                <span class="text-warm-muted small">Annalakshmi DMS &middot; Internal Tool for Oota.app</span>
            </div>
        </footer>
    </div>

    <!-- Bootstrap 5.3.3 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmxc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    
    <!-- Shared App Script -->
    <script src="/static/js/app.js"></script>
    
    <!-- Page-Specific Scripts -->
    {% block scripts %}{% endblock %}
</body>
</html>
