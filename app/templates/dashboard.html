{% extends "base.html" %}

{% block title %}Dashboard — Annalakshmi DMS{% endblock %}

{% block content %}
<input type="hidden" id="currentPage" value="dashboard">

<div class="page-header mb-4">
    <h1 class="h3 fw-bold mb-1">Dashboard</h1>
    <p class="subtitle mb-0">Overview of Annalakshmi operations</p>
</div>

<!-- Stat Cards -->
<div class="row g-4 mb-5" id="statsRow">
    <!-- Card 1: Total Records -->
    <div class="col-md-4">
        <div class="skeleton-card shimmer" id="skeleton-total" style="height: 120px; border-radius: 12px;"></div>
        <div class="card stat-card stat-card--total h-100" id="card-total" style="display:none;">
            <div class="card-body d-flex align-items-center">
                <div class="icon-circle bg-primary bg-opacity-10 text-primary rounded-circle me-3">
                    <i class="bi bi-people fs-4"></i>
                </div>
                <div>
                    <span class="stat-card__value d-block fs-3 fw-bold" id="stat-total">0</span>
                    <span class="stat-card__label text-warm-muted small text-uppercase fw-semibold">Total Records</span>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Card 2: Active -->
    <div class="col-md-4">
        <div class="skeleton-card shimmer" id="skeleton-active" style="height: 120px; border-radius: 12px;"></div>
        <div class="card stat-card stat-card--active h-100" id="card-active" style="display:none;">
            <div class="card-body d-flex align-items-center">
                <div class="icon-circle bg-success bg-opacity-10 text-success rounded-circle me-3">
                    <i class="bi bi-check-circle fs-4"></i>
                </div>
                <div>
                    <span class="stat-card__value d-block fs-3 fw-bold text-success" id="stat-active">0</span>
                    <span class="stat-card__label text-warm-muted small text-uppercase fw-semibold">Active</span>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Card 3: Inactive -->
    <div class="col-md-4">
        <div class="skeleton-card shimmer" id="skeleton-inactive" style="height: 120px; border-radius: 12px;"></div>
        <div class="card stat-card stat-card--inactive h-100" id="card-inactive" style="display:none;">
            <div class="card-body d-flex align-items-center">
                <div class="icon-circle bg-danger bg-opacity-10 text-danger rounded-circle me-3">
                    <i class="bi bi-archive fs-4"></i>
                </div>
                <div>
                    <span class="stat-card__value d-block fs-3 fw-bold text-danger" id="stat-inactive">0</span>
                    <span class="stat-card__label text-warm-muted small text-uppercase fw-semibold">Inactive</span>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Quick Actions -->
<div class="quick-actions">
    <h2 class="h5 fw-bold mb-3">Quick Actions</h2>
    <div class="d-flex flex-wrap gap-3">
        <a href="/pages/records" class="btn btn-outline-primary px-4">
            <i class="bi bi-list-ul me-2"></i>View Records
        </a>
        <a href="/pages/add" class="btn btn-primary px-4">
            <i class="bi bi-plus-circle me-2"></i>Add New
        </a>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="/static/js/dashboard.js"></script>
{% endblock %}
